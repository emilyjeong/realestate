<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부동산 지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0a09;
  --surface:   #0f0f0e;
  --card:      #161513;
  --card-hi:   #1c1b19;
  --border:    #2a2926;
  --border-mid:#353330;
  --ink:       #f0ede8;
  --ink-mid:   #9a9690;
  --ink-dim:   #565250;
  --pos:       #00c98a;
  --accent:    #e8b800;
  --info:      #5aabf0;
  --radius:    14px;
  --radius-sm: 8px;
  --pad:       16px;
  --font-sans: 'Pretendard', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; background:var(–bg); font-family:var(–font-sans); color:var(–ink); overflow:hidden; }

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

/* ── 헤더 ── */
#header {
background:var(–surface);
border-bottom:1px solid var(–border);
padding:12px var(–pad);
display:flex; align-items:center; gap:10px;
flex-shrink:0; z-index:100;
}
.header-title { font-size:15px; font-weight:700; color:var(–ink); flex:1; }
.header-badge {
font-family:var(–font-mono); font-size:10px; font-weight:600;
padding:3px 8px; border-radius:20px;
background:rgba(0,201,138,.12); color:var(–pos); border:1px solid rgba(0,201,138,.25);
}

/* ── 검색 영역 ── */
#search-area {
background:var(–surface);
border-bottom:1px solid var(–border);
flex-shrink:0; z-index:500; position:relative;
}
#searchbar { padding:10px var(–pad); }
.search-wrap {
background:var(–card); border:1px solid var(–border-mid);
border-radius:var(–radius-sm);
display:flex; align-items:center; padding:9px 12px; gap:8px;
transition:border-color .2s;
}
.search-wrap.focused { border-color:var(–info); }
.search-wrap input {
background:transparent; border:none; outline:none;
font-family:var(–font-sans); font-size:13px; color:var(–ink); width:100%;
}
.search-wrap input::placeholder { color:var(–ink-dim); }
.search-clear { color:var(–ink-dim); font-size:14px; cursor:pointer; padding:2px 4px; display:none; flex-shrink:0; }

/* 검색 결과 */
#search-results {
display:none;
border-top:1px solid var(–border);
max-height:260px; overflow-y:auto;
}
.sri {
padding:12px var(–pad);
border-bottom:1px solid var(–border);
cursor:pointer;
transition:background .15s;
}
.sri:last-child { border-bottom:none; }
.sri:active { background:var(–card); }
.sri-name { font-size:13px; font-weight:600; color:var(–ink); }
.sri-addr { font-size:11px; color:var(–ink-dim); margin-top:2px; }
.search-empty { padding:16px var(–pad); font-size:13px; color:var(–ink-dim); text-align:center; }
.search-loading { padding:16px var(–pad); font-size:13px; color:var(–ink-dim); text-align:center; font-family:var(–font-mono); }

/* ── 지도 ── */
#map-container { flex:1; position:relative; z-index:1; }
#map { width:100%; height:100%; }

/* ── 로딩 ── */
#map-loading {
position:absolute; inset:0; background:var(–bg);
display:flex; flex-direction:column; align-items:center; justify-content:center;
gap:14px; z-index:50; transition:opacity .4s;
}
#map-loading.hidden { opacity:0; pointer-events:none; }
.spinner { width:36px; height:36px; border:3px solid var(–border-mid); border-top-color:var(–accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(–ink-dim); font-family:var(–font-mono); }
</style>

</head>
<body>
<div id="app">

  <div id="header">
    <div class="header-title">🏢 부동산 지도</div>
    <div class="header-badge">LIVE</div>
  </div>

  <div id="search-area">
    <div id="searchbar">
      <div class="search-wrap" id="search-wrap">
        <span style="color:var(--ink-dim);font-size:14px;flex-shrink:0;">🔍</span>
        <input type="text" placeholder="지역·단지명 검색" id="search-input" autocomplete="off">
        <span class="search-clear" id="search-clear">✕</span>
      </div>
    </div>
    <div id="search-results"></div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="map-loading">
      <div class="spinner"></div>
      <span class="loading-text">지도 불러오는 중...</span>
    </div>
  </div>

</div>

<script>
var map, ps;

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.548, 126.953),
    level: 5,
  });

  // 카카오 Places 서비스 초기화
  ps = new kakao.maps.services.Places();

  var loading = document.getElementById('map-loading');
  loading.classList.add('hidden');
  setTimeout(function(){ loading.remove(); }, 500);

  // 지도 클릭 시 결과 닫기
  kakao.maps.event.addListener(map, 'click', function() {
    hideResults();
    document.getElementById('search-input').blur();
  });
}

// ── 검색 ──
var sinput  = document.getElementById('search-input');
var swrap   = document.getElementById('search-wrap');
var sclear  = document.getElementById('search-clear');
var sresult = document.getElementById('search-results');
var searchTimer = null;

sinput.addEventListener('focus', function() { swrap.classList.add('focused'); });
sinput.addEventListener('blur',  function() { swrap.classList.remove('focused'); setTimeout(hideResults, 200); });

sinput.addEventListener('input', function() {
  var q = sinput.value.trim();
  sclear.style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) { hideResults(); return; }
  // 타이핑 멈추고 300ms 후 검색
  searchTimer = setTimeout(function() { doSearch(q); }, 300);
});

sclear.addEventListener('click', function() {
  sinput.value = '';
  sclear.style.display = 'none';
  hideResults();
  sinput.focus();
});

function doSearch(q) {
  if (!ps) return;
  sresult.innerHTML = '<div class="search-loading">검색 중...</div>';
  sresult.style.display = 'block';

  ps.keywordSearch(q, function(data, status) {
    if (status === kakao.maps.services.Status.OK) {
      renderResults(data);
    } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
      sresult.innerHTML = '<div class="search-empty">검색 결과가 없어요</div>';
    } else {
      sresult.innerHTML = '<div class="search-empty">검색 중 오류가 발생했어요</div>';
    }
  }, { size: 10 });
}

function renderResults(data) {
  sresult.innerHTML = data.map(function(p, i) {
    return '<div class="sri" data-idx="' + i + '">'
      + '<div class="sri-name">' + p.place_name + '</div>'
      + '<div class="sri-addr">' + (p.road_address_name || p.address_name) + '</div>'
      + '</div>';
  }).join('');

  sresult.querySelectorAll('.sri').forEach(function(el, i) {
    el.addEventListener('click', function() {
      var p = data[i];
      var latlng = new kakao.maps.LatLng(p.y, p.x);
      map.setCenter(latlng);
      map.setLevel(3);
      sinput.value = p.place_name;
      sclear.style.display = 'block';
      hideResults();
      sinput.blur();
    });
  });
}

function hideResults() { sresult.style.display = 'none'; }

// ── SDK 로드 (services 라이브러리 포함) ──
var s = document.createElement('script');
s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=c39d5438e2baf9e5a326fb7d5771faa4&autoload=false&libraries=services';
s.onload = function() { kakao.maps.load(initMap); };
document.head.appendChild(s);
</script>

</body>
</html>
