<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부동산 지도 DEBUG</title>
<script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c39d5438e2baf9e5a326fb7d5771faa4&autoload=false"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a09; color:#f0ede8; font-family:sans-serif; }
  #debug {
    position:fixed; top:0; left:0; right:0;
    background:#1c1b19; border-bottom:1px solid #353330;
    padding:14px 16px; font-size:13px; z-index:9999; line-height:1.8;
  }
  .ok   { color:#00c98a; }
  .err  { color:#f04d62; }
  .warn { color:#e8b800; }
  #map  { position:fixed; top:0; left:0; right:0; bottom:0; z-index:1; }
</style>
</head>
<body>
<div id="map"></div>
<div id="debug"><span id="log">🔍 로딩중...</span></div>
<script>
var logEl = document.getElementById('log');
function log(msg, type) {
  logEl.innerHTML += '<br><span class="'+(type||'')+'">'+msg+'</span>';
}

window.onerror = function(msg, src, line) {
log(‘❌ 오류: ‘+msg+’ (line ‘+line+’)’, ‘err’);
};

if (typeof kakao === ‘undefined’) {
log(‘❌ kakao 객체 없음 — SDK 로드 실패’, ‘err’);
log(‘💡 JS키 또는 도메인 등록 확인 필요’, ‘warn’);
} else {
log(‘✅ kakao SDK 로드 성공’, ‘ok’);
try {
kakao.maps.load(function() {
log(‘✅ kakao.maps.load() 콜백 실행’, ‘ok’);
try {
var map = new kakao.maps.Map(document.getElementById(‘map’), {
center: new kakao.maps.LatLng(37.548, 126.953),
level: 4
});
log(‘🎉 지도 생성 성공! 이 텍스트 캡처해서 보내줘’, ‘ok’);
document.getElementById(‘debug’).style.top = ‘auto’;
document.getElementById(‘debug’).style.bottom = ‘0’;
} catch(e) {
log(’❌ 지도 생성 실패: ’+e.message, ‘err’);
}
});
log(‘⏳ 콜백 대기중…’, ‘warn’);
} catch(e) {
log(’❌ load() 오류: ’+e.message, ‘err’);
}
}
</script>

</body>
</html>
