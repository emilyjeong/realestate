<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>부동산 지도</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="config.js"></script>
<style>
:root {
  --bg:#0a0a09; --surface:#0f0f0e; --card:#161513; --card-hi:#1c1b19;
  --border:#2a2926; --border-mid:#353330;
  --ink:#f0ede8; --ink-mid:#9a9690; --ink-dim:#565250;
  --pos:#00c98a; --neg:#f04d62; --accent:#e8b800; --info:#5aabf0; --purple:#b8a8f0;
  --radius:14px; --radius-sm:8px; --pad:16px;
  --font-sans:'Pretendard',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg)!important;font-family:var(--font-sans);color:var(--ink);overflow:hidden;color-scheme:dark;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

#header{background:var(--surface)!important;border-bottom:1px solid var(--border);padding:12px var(--pad);padding-left:max(var(--pad),env(safe-area-inset-left));padding-right:max(var(--pad),env(safe-area-inset-right));display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:100;}
.header-title{font-size:22px;font-weight:700;color:var(--ink);flex:1;}
.home-btn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;background:var(--card-hi);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:17px;text-decoration:none;transition:border-color .12s,background .12s,transform .08s;}
.home-btn:active{background:var(--border);transform:scale(.95);}

#search-area{background:var(--surface)!important;border-bottom:1px solid var(--border);flex-shrink:0;z-index:500;position:relative;}
#searchbar{padding:10px var(--pad);padding-left:max(var(--pad),env(safe-area-inset-left));padding-right:max(var(--pad),env(safe-area-inset-right));}
.search-wrap{background:var(--card);border:1px solid var(--border-mid);border-radius:var(--radius-sm);display:flex;align-items:center;padding:9px 12px;gap:8px;transition:border-color .2s;}
.search-wrap.focused{border-color:var(--info);}
.search-wrap input{background:transparent;border:none;outline:none;font-family:var(--font-sans);font-size:13px;color:var(--ink);width:100%;}
.search-wrap input::placeholder{color:var(--ink-dim);}
.search-clear{color:var(--ink-dim);font-size:14px;cursor:pointer;padding:2px 4px;display:none;flex-shrink:0;}
#search-results{display:none;border-top:1px solid var(--border);max-height:260px;overflow-y:auto;}
.sri{padding:12px var(--pad);border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px;}
.sri:last-child{border-bottom:none;}
.sri:active{background:var(--card);}
.sri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sri-name{font-size:13px;font-weight:600;color:var(--ink);}
.sri-addr{font-size:11px;color:var(--ink-dim);margin-top:2px;}
.search-empty{padding:16px var(--pad);font-size:13px;color:var(--ink-dim);text-align:center;}

#map-container{flex:1;position:relative;z-index:1;}
#map{width:100%;height:100%;}

#map-loading{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:50;transition:opacity .4s;}
#map-loading.hidden{opacity:0;pointer-events:none;}
.spinner{width:36px;height:36px;border:3px solid var(--border-mid);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--ink-dim);font-family:var(--font-mono);}

#popup{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:360px;background:var(--card-hi);border:1px solid var(--border-mid);border-radius:var(--radius);padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:20;display:none;animation:popIn .2s ease;}
#popup.show{display:block;}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.popup-close{position:absolute;top:10px;right:12px;font-size:15px;color:var(--ink-dim);cursor:pointer;padding:4px;}
.popup-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-right:20px;}
.popup-tag-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.popup-tag-icon i{font-size:14px;color:#fff;}
.popup-name{font-size:14px;font-weight:700;color:var(--ink);}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.popup-label{font-size:10px;color:var(--ink-dim);margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;}
.popup-val{font-size:13px;font-weight:700;font-family:var(--font-mono);color:var(--ink);}
.popup-val.acc{color:var(--accent);}
.popup-val.pos{color:var(--pos);}
.popup-val.neg{color:var(--neg);}
.popup-val.info{color:var(--info);}
.popup-btn{width:100%;padding:10px;background:rgba(90,171,240,.12);border:1px solid rgba(90,171,240,.3);border-radius:var(--radius-sm);color:var(--info);font-size:12px;font-weight:600;font-family:var(--font-sans);cursor:pointer;text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="header-title">부동산 지도</div>
    <a href="https://emilyjeong.github.io/home" class="home-btn">🏠</a>
  </div>

  <div id="search-area">
    <div id="searchbar">
      <div class="search-wrap" id="search-wrap">
        <span style="color:var(--ink-dim);font-size:14px;flex-shrink:0;">🔍</span>
        <input type="text" placeholder="등록된 단지명 검색" id="search-input" autocomplete="off">
        <span class="search-clear" id="search-clear">✕</span>
      </div>
    </div>
    <div id="search-results"></div>
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="map-loading">
      <div class="spinner"></div>
      <span class="loading-text">데이터 불러오는 중...</span>
    </div>
    <div id="popup">
      <span class="popup-close" id="popup-close">✕</span>
      <div class="popup-header">
        <div class="popup-tag-icon" id="popup-icon"><i class="ti ti-building"></i></div>
        <div class="popup-name" id="popup-name"></div>
      </div>
      <div class="popup-grid" id="popup-grid"></div>
      <div class="popup-btn" id="popup-detail-btn">상세 데이터 보기 →</div>
    </div>
  </div>
</div>

<script>
var map, aptData = [], selectedApt = null;

var TAG_CONFIG = {
  '추천': { color:'#00c98a', icon:'ti-star' },
  '주시': { color:'#e8b800', icon:'ti-eye' },
  '함정': { color:'#888780', icon:'ti-alert-triangle' },
  '보류': { color:'#b8a8f0', icon:'ti-clock' },
  '검토': { color:'#5aabf0', icon:'ti-search' },
};

function loadData() {
  fetch(CONFIG.SCRIPT_URL)
    .then(function(r){ return r.json(); })
    .then(function(json){
      aptData = json.apts || [];
      initMap();
    })
    .catch(function(e){
      console.error('데이터 로드 실패:', e);
      initMap();
    });
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.548, 126.953),
    level: 7,
  });
  var loading = document.getElementById('map-loading');
  loading.classList.add('hidden');
  setTimeout(function(){ loading.remove(); }, 500);
  if (aptData.length > 0) addMarkers();
  kakao.maps.event.addListener(map, 'click', function(){
    closePopup(); hideResults();
    document.getElementById('search-input').blur();
  });
}

// ── 마커 B 스타일 ──
function addMarkers() {
  aptData.forEach(function(apt) {
    if (!apt.lat || !apt.lng) return;
    var cfg = TAG_CONFIG[apt.tag] || TAG_CONFIG['검토'];
    var color = cfg.color;

    var markerEl = document.createElement('div');
    markerEl.style.cssText = 'display:flex;flex-direction:column;align-items:center;cursor:pointer;';
    markerEl.innerHTML = 
      '<div style="width:14px;height:14px;border-radius:50%;background:' + color + ';border:2.5px solid white;box-shadow:0 2px 6px rgba(0,0,0,.5);"></div>'
      + '<div style="width:2px;height:12px;background:' + color + ';opacity:.8;"></div>';

    var overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(apt.lat, apt.lng),
      content: markerEl,
      zIndex: 3,
    });
    overlay.setMap(map);

    (function(a){
      markerEl.addEventListener('click', function(e){
        e.stopPropagation();
        showPopup(a);
      });
    })(apt);
  });
}

function showPopup(apt) {
  selectedApt = apt;
  var cfg = TAG_CONFIG[apt.tag] || TAG_CONFIG['검토'];
  var iconEl = document.getElementById('popup-icon');
  iconEl.style.background = cfg.color;
  iconEl.innerHTML = '<i class="ti ' + cfg.icon + '" style="font-size:14px;color:#fff;"></i>';
  document.getElementById('popup-name').textContent = apt.aptName;
  document.getElementById('popup-grid').innerHTML =
    pi('중앙값',  apt.median     ? (apt.median/10000).toFixed(1)   + '억' : '-', 'acc') +
    pi('면적기준', apt.areaRange  || '-', '') +
    pi('최저가',  apt.minPrice   ? (apt.minPrice/10000).toFixed(1)  + '억' : '-', 'pos') +
    pi('최고가',  apt.maxPrice   ? (apt.maxPrice/10000).toFixed(1)  + '억' : '-', '') +
    pi('거래건수', apt.tradeCount ? apt.tradeCount + '건' : '-', '') +
    pi('세대수',  apt.totalUnits ? apt.totalUnits + '세대' : '-', '') +
    pi('준공',    apt.yearBuilt  || '-', '') +
    pi('태그',    apt.tag        || '-', '');
  document.getElementById('popup').classList.add('show');
}

function closePopup(){ document.getElementById('popup').classList.remove('show'); }
document.getElementById('popup-close').addEventListener('click', closePopup);
document.getElementById('popup-detail-btn').addEventListener('click', function(){
  if (selectedApt) alert(selectedApt.aptName + '\n\n👉 상세 페이지 연결 예정!');
});

function pi(label, val, cls){
  return '<div><div class="popup-label">'+label+'</div><div class="popup-val '+cls+'">'+val+'</div></div>';
}

// ── 검색 ──
var sinput  = document.getElementById('search-input');
var swrap   = document.getElementById('search-wrap');
var sclear  = document.getElementById('search-clear');
var sresult = document.getElementById('search-results');

sinput.addEventListener('focus', function(){ swrap.classList.add('focused'); });
sinput.addEventListener('blur',  function(){ swrap.classList.remove('focused'); setTimeout(hideResults,200); });
sinput.addEventListener('input', function(){
  var q = sinput.value.trim();
  sclear.style.display = q ? 'block' : 'none';
  if (q) doSearch(q); else hideResults();
});
sclear.addEventListener('click', function(){
  sinput.value=''; sclear.style.display='none'; hideResults(); sinput.focus();
});

function doSearch(q) {
  var lower = q.toLowerCase();
  var filtered = aptData.filter(function(a){ return a.aptName.toLowerCase().includes(lower); });
  if (!filtered.length) {
    sresult.innerHTML = '<div class="search-empty">등록된 단지가 없어요</div>';
  } else {
    sresult.innerHTML = filtered.map(function(a,i){
      var cfg = TAG_CONFIG[a.tag] || TAG_CONFIG['검토'];
      return '<div class="sri" data-idx="'+i+'">'
        +'<div class="sri-dot" style="background:'+cfg.color+';"></div>'
        +'<div><div class="sri-name">'+a.aptName+'</div>'
        +'<div class="sri-addr">'+(a.address||'')+'</div></div>'
        +'</div>';
    }).join('');
    sresult.querySelectorAll('.sri').forEach(function(el,i){
      el.addEventListener('click', function(){
        var apt = filtered[i];
        if (apt.lat && apt.lng && map){
          map.setCenter(new kakao.maps.LatLng(apt.lat,apt.lng));
          map.setLevel(4);
          showPopup(apt);
        }
        sinput.value = apt.aptName;
        sclear.style.display='block';
        hideResults(); sinput.blur();
      });
    });
  }
  sresult.style.display='block';
}

function hideResults(){ sresult.style.display='none'; }

// ── SDK 로드 ──
var s = document.createElement('script');
s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=c39d5438e2baf9e5a326fb7d5771faa4&autoload=false&libraries=services';
s.onload = function(){ kakao.maps.load(loadData); };
document.head.appendChild(s);
</script>
</body>
</html>
